name: Build Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, curl, fileinfo, pdo, pdo_mysql
          coverage: none

      - name: Install Composer production dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            -czf /tmp/dao3-release.tar.gz .
          cp /tmp/dao3-release.tar.gz dao3-release.tar.gz

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: dao3-release
          path: dao3-release.tar.gz
          retention-days: 7

      - name: Upload release to production server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: dao3-release.tar.gz
          target: /tmp/dao3-release

      - name: Deploy release on production server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          port: ${{ secrets.PROD_PORT }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/data/wwwroot/v3.cpttmm.com
            PHP_BIN=/usr/local/php/bin/php
            APP_USER=www
            APP_GROUP=www
            RELEASE_ID=${{ github.run_number }}-${{ github.sha }}
            RELEASE_DIR="$APP_DIR/releases/$RELEASE_ID"
            SHARED_DIR="$APP_DIR/shared"

            mkdir -p "$APP_DIR/releases" "$SHARED_DIR" "$RELEASE_DIR"
            tar -xzf /tmp/dao3-release/dao3-release.tar.gz -C "$RELEASE_DIR"

            test -f "$SHARED_DIR/.env"
            test -d "$SHARED_DIR/storage"

            ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
            rm -rf "$RELEASE_DIR/storage"
            ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"

            ln -sfn "$RELEASE_DIR" "$APP_DIR/current"

            cd "$RELEASE_DIR"
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan storage:link || true

            chown -R "$APP_USER:$APP_GROUP" "$RELEASE_DIR"

            supervisorctl restart 'Laravel-worker-3:*'
            supervisorctl restart 'Laravel-Reverb:*'

            find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
              | sort -rn \
              | tail -n +6 \
              | cut -d' ' -f2- \
              | xargs -r rm -rf
